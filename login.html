<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1B3A6B">
<title>Risse S.A. — Connexion</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#1B3A6B;--navy2:#122952;--yellow:#F0A500;--teal:#1A7F72;
  --white:#fff;--bg:#F4F6FB;--border:#E0E4EF;--text:#1A2340;--text2:#4A5878;--text3:#9AA3BC;
  --r:14px;--sh:0 2px 12px rgba(27,58,107,.10);--shm:0 4px 20px rgba(27,58,107,.15);
  --safe-b:env(safe-area-inset-bottom,0px);--safe-t:env(safe-area-inset-top,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Inter',sans-serif;background:var(--navy);color:var(--text);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}

.login-box{
  background:#fff;border-radius:20px;padding:36px 28px 32px;
  width:100%;max-width:380px;
  box-shadow:0 8px 40px rgba(0,0,0,.25);
}

.login-logo{text-align:center;margin-bottom:24px;}
.login-logo img{width:72px;height:72px;border-radius:50%;border:3px solid var(--navy);object-fit:contain;padding:4px;}
.login-title{font-size:20px;font-weight:700;color:var(--navy);text-align:center;margin-top:12px;}
.login-sub{font-size:12px;color:var(--text3);text-align:center;margin-top:4px;}

.form-group{margin-top:20px;}
.form-label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;display:block;letter-spacing:.3px;}
.form-input{
  width:100%;padding:13px 16px;
  border:1.5px solid var(--border);border-radius:10px;
  font-size:15px;font-family:'Inter',sans-serif;color:var(--text);
  background:#fff;outline:none;transition:border-color .2s;
}
.form-input:focus{border-color:var(--navy);}

.btn-login{
  width:100%;margin-top:26px;padding:15px;
  background:var(--navy);color:#fff;
  border:none;border-radius:12px;
  font-size:15px;font-weight:700;font-family:'Inter',sans-serif;
  cursor:pointer;transition:background .2s, transform .1s;
  letter-spacing:.3px;
}
.btn-login:active{transform:scale(.97);}
.btn-login:disabled{background:var(--text3);cursor:default;}

.error-msg{
  margin-top:14px;padding:11px 14px;
  background:#FEF2F2;border:1px solid #FCA5A5;border-radius:8px;
  font-size:12px;color:#DC2626;font-weight:500;
  display:none;
}
.error-msg.show{display:block;}

.login-footer{text-align:center;font-size:10px;color:rgba(255,255,255,.35);margin-top:24px;}
</style>
</head>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyA5Zk0TBr_Qr4_12CO8_x8oymsxO7u6IEE",
  authDomain: "risse-sa.firebaseapp.com",
  projectId: "risse-sa",
  storageBucket: "risse-sa.firebasestorage.app",
  messagingSenderId: "656425275771",
  appId: "1:656425275771:web:b82c58557e41e6d1deadde"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// Si déjà connecté → redirect hub
onAuthStateChanged(auth, user => {
  if (user) window.location.href = 'index.html';
});

// Connexion
const btnLogin = document.getElementById('btnLogin');
const emailInput = document.getElementById('emailInput');
const passInput = document.getElementById('passInput');
const errorMsg = document.getElementById('errorMsg');

function showError(msg) {
  errorMsg.textContent = msg;
  errorMsg.classList.add('show');
}

function hideError() {
  errorMsg.classList.remove('show');
}

async function doLogin() {
  const email = emailInput.value.trim();
  const pass = passInput.value;

  if (!email || !pass) {
    showError('Veuillez remplir tous les champs.');
    return;
  }

  btnLogin.disabled = true;
  btnLogin.textContent = 'Connexion...';
  hideError();

  try {
    await signInWithEmailAndPassword(auth, email, pass);
    // onAuthStateChanged gère la redirection
  } catch (err) {
    btnLogin.disabled = false;
    btnLogin.textContent = 'Se connecter';
    switch (err.code) {
      case 'auth/user-not-found':
      case 'auth/wrong-password':
      case 'auth/invalid-credential':
        showError('Email ou mot de passe incorrect.');
        break;
      case 'auth/too-many-requests':
        showError('Trop de tentatives. Réessayez dans quelques minutes.');
        break;
      default:
        showError('Erreur de connexion. Vérifiez votre connexion internet.');
    }
  }
}

btnLogin.addEventListener('click', doLogin);
passInput.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
emailInput.addEventListener('keydown', e => { if (e.key === 'Enter') passInput.focus(); });
</script>
